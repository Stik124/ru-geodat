name: Build GeoIP Files

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'config.json'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Clone geoip builder
        run: |
          git clone https://github.com/v2fly/geoip.git /tmp/geoip-builder

      - name: Copy config
        run: |
          cp config.json /tmp/geoip-builder/

      - name: Build
        run: |
          cd /tmp/geoip-builder
          go run ./ -c config.json

      - name: Show output structure
        run: |
          echo "=== Что создал сборщик ==="
          find /tmp/geoip-builder/output -type f

      - name: Copy output files
        run: |
          mkdir -p release/text
          cp /tmp/geoip-builder/output/dat/geoip.dat release/geoip.dat
          cp /tmp/geoip-builder/output/text/ru-whitelist.txt release/text/

      - name: Show file sizes
        run: |
          echo "=== Размеры файлов ==="
          ls -lh release/
          ls -lh release/text/
          echo "=== Количество записей ==="
          wc -l release/text/*.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          body: |
            Обновлено: ${{ github.run_id }}
            
            ## Файлы
            - `geoip.dat` — для Xray / V2Ray
            
            ## Использование
            ```
            geoip:ru-whitelist → direct
            ```
          files: |
            release/geoip.dat
            release/text/ru-whitelist.txt
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit to repository
        run: |
          git config user.name "GitHub Actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release/
          git diff --staged --quiet || git commit -m "chore: update $(date '+%Y-%m-%d %H:%M UTC')"
          git push
