name: Build GeoIP Files

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'config.json'
      - 'extra_ips.txt'
      - 'exclude_ips.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Clone geoip builder
        run: |
          git clone https://github.com/v2fly/geoip.git /tmp/geoip-builder

      - name: Copy config and lists
        run: |
          cp config.json /tmp/geoip-builder/
          cp extra_ips.txt /tmp/geoip-builder/
          cp exclude_ips.txt /tmp/geoip-builder/

      - name: Build
        run: |
          cd /tmp/geoip-builder
          go run ./ -c config.json

      - name: Copy output
        run: |
          cp /tmp/geoip-builder/output/dat/geoip.dat geoip.dat

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          files: geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
